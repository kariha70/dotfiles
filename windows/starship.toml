add_newline = false
format = "$os$directory$git_branch$git_status$character"

[os]
disabled = false
style = "bold white"
format = "[$symbol]($style) "

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
Debian = "󰣚"
Arch = "󰣇"
Macos = "󰀵"
Linux = "󰌽"
Unknown = "󰠥"

[directory]
style = "bold cyan"
format = "[ $path]($style) "
truncation_length = 2
truncate_to_repo = true
truncation_symbol = "../"
home_symbol = "~"

[git_branch]
symbol = " "
style = "bold green"
format = "[$symbol$branch]($style) "

[git_status]
style = "red"
format = "([$all_status$ahead_behind]($style) )"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[character]
success_symbol = "[>](bold green) "
error_symbol = "[>](bold red) "
vimcmd_symbol = "[<](bold yellow) "
