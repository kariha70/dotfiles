# Modern terminal capabilities
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:RGB'   # enable truecolor for all terms
set -g allow-passthrough on           # let OSC queries (p10k) round-trip cleanly

# Usability tweaks
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g status-keys vi
setw -g mode-keys vi
set -s escape-time 10                 # keep escapes responsive for vim
set -g focus-events on                # send focus hints to apps
set -g set-clipboard on               # prefer OSC 52/system clipboard sync when available

# Quick reload
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Split and resize helpers
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind S setw synchronize-panes \; display-message "sync #{?pane_synchronized,on,off}"

# Status line
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=#1f2335,fg=#cdd6f4"
set -g pane-border-style "fg=#3b3f52"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#89b4fa,fg=#1f2335"
set -g message-command-style "bg=#f2cdcd,fg=#1f2335"

set -g window-status-format '#[fg=#6c7086,bg=#1f2335] #I #[fg=#a6adc8]#W '
set -g window-status-current-format '#[fg=#1f2335,bg=#89b4fa,bold] #I #[fg=#1f2335,bg=#89b4fa]#W '

set -g status-left-length 80
set -g status-left '#[bg=#89b4fa,fg=#1f2335,bold] #S #[bg=#1f2335,fg=#89b4fa] |#[fg=#cdd6f4,bg=#1f2335] #{?pane_synchronized,SYNC ,}'

set -g status-right-length 120
set -g status-right '#{?client_prefix,#[fg=#f38ba8]PFX #[fg=#6c7086]| ,}#[fg=#a6e3a1]#H #[fg=#6c7086]| #[fg=#fab387]%Y-%m-%d #[fg=#89b4fa]%H:%M '
