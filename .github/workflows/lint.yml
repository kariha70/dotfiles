name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck bootstrap.sh install/*.sh install/lib/helpers.sh scripts/*.sh

  powershell-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        run: pwsh -Command 'Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser'

      - name: Run PSScriptAnalyzer
        run: |
          pwsh -Command '
            $results = @()
            $files = Get-ChildItem -Recurse -Include "*.ps1" -Exclude "versions.ps1"
            foreach ($f in $files) {
              $results += Invoke-ScriptAnalyzer -Path $f.FullName -Severity Error,Warning
            }
            if ($results.Count -gt 0) {
              $results | Format-Table -AutoSize
              exit 1
            }
            Write-Host "No PSScriptAnalyzer issues found."
          '
